<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro PDF Merger & Sorter</title>


<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f0f2f5;
        margin: 0;
        padding: 40px;
        display: flex;
        justify-content: center;
    }

    .container {
        background: white;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 600px;
        padding: 30px;
    }

    h2 {
        text-align: center;
        color: #1a73e8;
    }

    #drop-zone {
        border: 2px dashed #1a73e8;
        border-radius: 10px;
        padding: 40px;
        text-align: center;
        cursor: pointer;
        background: #f8fbff;
        color: #1a73e8;
        font-weight: 600;
        margin-bottom: 10px;
    }

    #camera-btn {
        width: 100%;
        margin-top: 10px;
        background: #34a853;
        color: white;
        padding: 10px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
    }

    #camera-container {
        display: none;
        margin-top: 15px;
        text-align: center;
    }

    video {
        width: 100%;
        border-radius: 8px;
    }

    #capture-btn {
        margin-top: 10px;
        background: #ea4335;
        color: white;
        padding: 10px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
    }

    .file-item {
        display: flex;
        align-items: center;
        border: 1px solid #ddd;
        margin-top: 8px;
        padding: 10px;
        border-radius: 6px;
        background: #fff;
        cursor: grab;
    }

    .file-number {
        background: #1a73e8;
        color: white;
        width: 22px;
        height: 22px;
        border-radius: 50%;
        text-align: center;
        margin-right: 10px;
        font-size: 12px;
    }

    .remove-btn {
        margin-left: auto;
        color: red;
        cursor: pointer;
    }

    .actions {
        display: flex;
        gap: 10px;
        margin-top: 15px;
    }

    button {
        flex: 1;
        padding: 10px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
    }

    #merge-btn {
        background: #1a73e8;
        color: white;
    }

    #clear-btn {
        background: #eee;
    }
</style>


</head>

<body>


<div class="container">
    <h2>PDF Merger & Sorter</h2>

    <div id="drop-zone">
        Click or Drag Files Here
    </div>

    <button id="camera-btn">📸 Use Camera</button>

    <div id="camera-container">
        <video id="camera" autoplay playsinline></video>
        <button id="capture-btn">Capture</button>
    </div>

    <input type="file" id="file-input" multiple hidden accept=".pdf,image/*">

    <div id="file-list"></div>

    <div class="actions">
        <button id="clear-btn">Clear</button>
        <button id="merge-btn" disabled>Merge & Download</button>
    </div>
</div>

<script>
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const fileList = document.getElementById('file-list');
    const mergeBtn = document.getElementById('merge-btn');
    const clearBtn = document.getElementById('clear-btn');

    const cameraBtn = document.getElementById('camera-btn');
    const cameraContainer = document.getElementById('camera-container');
    const video = document.getElementById('camera');
    const captureBtn = document.getElementById('capture-btn');

    let filesArray = [];
    let stream = null;

    new Sortable(fileList, {
        animation: 150,
        onEnd: () => {
            reorderFiles();
            updateNumbers();
        }
    });

    dropZone.onclick = () => fileInput.click();
    fileInput.onchange = (e) => handleFiles(e.target.files);

    dropZone.ondragover = (e) => e.preventDefault();
    dropZone.ondrop = (e) => {
        e.preventDefault();
        handleFiles(e.dataTransfer.files);
    };

    function handleFiles(files) {
        for (let file of files) {
            file.id = Math.random().toString(36).substr(2, 9);
            filesArray.push(file);
            renderFileItem(file);
        }
        updateNumbers();
        updateUI();
    }

    function renderFileItem(file) {
        const div = document.createElement('div');
        div.className = 'file-item';
        div.dataset.id = file.id;
        div.innerHTML = `
            <div class="file-number">0</div>
            <span>${file.name}</span>
            <span class="remove-btn">&times;</span>
        `;

        div.querySelector('.remove-btn').onclick = () => removeFile(file.id);

        fileList.appendChild(div);
    }

    function removeFile(id) {
        filesArray = filesArray.filter(f => f.id !== id);
        document.querySelector(`[data-id="${id}"]`).remove();
        updateNumbers();
        updateUI();
    }

    function updateNumbers() {
        document.querySelectorAll('.file-item').forEach((el, i) => {
            el.querySelector('.file-number').textContent = i + 1;
        });
    }

    function reorderFiles() {
        const ids = [...document.querySelectorAll('.file-item')].map(el => el.dataset.id);
        filesArray = ids.map(id => filesArray.find(f => f.id === id));
    }

    function updateUI() {
        mergeBtn.disabled = filesArray.length === 0;
    }

    clearBtn.onclick = () => {
        filesArray = [];
        fileList.innerHTML = '';
        updateUI();
    };

    cameraBtn.onclick = async () => {
        cameraContainer.style.display = "block";
        try {
            stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment" }
            });
            video.srcObject = stream;
        } catch {
            alert("Camera not available.");
        }
    };

    function stopCamera() {
        if (stream) {
            stream.getTracks().forEach(t => t.stop());
            stream = null;
        }
    }

    captureBtn.onclick = () => {
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0);

        const dataUrl = canvas.toDataURL("image/jpeg", 0.9);

        fetch(dataUrl)
            .then(res => res.arrayBuffer())
            .then(buffer => {
                const file = new File([buffer], `capture_${Date.now()}.jpg`, {
                    type: "image/jpeg"
                });
                handleFiles([file]);
            });

        stopCamera();
        cameraContainer.style.display = "none";
    };

    mergeBtn.onclick = async () => {
        mergeBtn.disabled = true;

        const { PDFDocument } = PDFLib;
        const mergedPdf = await PDFDocument.create();

        for (const file of filesArray) {
            const buffer = await file.arrayBuffer();
            let img;

            if (file.type === "application/pdf") {
                const pdf = await PDFDocument.load(buffer);
                const pages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
                pages.forEach(p => mergedPdf.addPage(p));
                continue;
            }

            try {
                if (file.type === "image/png") {
                    img = await mergedPdf.embedPng(buffer);
                } else {
                    img = await mergedPdf.embedJpg(buffer);
                }
            } catch {
                img = await mergedPdf.embedPng(buffer);
            }

            const page = mergedPdf.addPage([img.width, img.height]);
            page.drawImage(img, { x: 0, y: 0, width: img.width, height: img.height });
        }

        const pdfBytes = await mergedPdf.save();
        const blob = new Blob([pdfBytes], { type: "application/pdf" });

        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = "merged.pdf";
        link.click();

        mergeBtn.disabled = false;
    };
</script>


</body>

</html>
