```
<div class="container">
    <h2>PDF Merger & Sorter</h2>

    <div id="drop-zone">
        Click or Drag Files Here
    </div>

    <button id="camera-btn">📸 Use Camera</button>

    <div id="camera-container">
        <video id="camera" autoplay playsinline></video>
        <button id="capture-btn">Capture</button>
    </div>

    <input type="file" id="file-input" multiple hidden accept=".pdf,image/*">

    <div id="file-list"></div>

    <div class="actions">
        <button id="clear-btn">Clear</button>
        <button id="merge-btn" disabled>Merge & Download</button>
    </div>
</div>

<script>
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const fileList = document.getElementById('file-list');
    const mergeBtn = document.getElementById('merge-btn');
    const clearBtn = document.getElementById('clear-btn');

    const cameraBtn = document.getElementById('camera-btn');
    const cameraContainer = document.getElementById('camera-container');
    const video = document.getElementById('camera');
    const captureBtn = document.getElementById('capture-btn');

    let filesArray = [];
    let stream = null;

    new Sortable(fileList, {
        animation: 150,
        onEnd: () => {
            reorderFiles();
            updateNumbers();
        }
    });

    dropZone.onclick = () => fileInput.click();
    fileInput.onchange = (e) => handleFiles(e.target.files);

    dropZone.ondragover = (e) => e.preventDefault();
    dropZone.ondrop = (e) => {
        e.preventDefault();
        handleFiles(e.dataTransfer.files);
    };

    function handleFiles(files) {
        for (let file of files) {
            file.id = Math.random().toString(36).substr(2, 9);
            filesArray.push(file);
            renderFileItem(file);
        }
        updateNumbers();
        updateUI();
    }

    function renderFileItem(file) {
        const div = document.createElement('div');
        div.className = 'file-item';
        div.dataset.id = file.id;
        div.innerHTML = `
            <div class="file-number">0</div>
            <span>${file.name}</span>
            <span class="remove-btn">&times;</span>
        `;

        div.querySelector('.remove-btn').onclick = () => removeFile(file.id);

        fileList.appendChild(div);
    }

    function removeFile(id) {
        filesArray = filesArray.filter(f => f.id !== id);
        document.querySelector(`[data-id="${id}"]`).remove();
        updateNumbers();
        updateUI();
    }

    function updateNumbers() {
        document.querySelectorAll('.file-item').forEach((el, i) => {
            el.querySelector('.file-number').textContent = i + 1;
        });
    }

    function reorderFiles() {
        const ids = [...document.querySelectorAll('.file-item')].map(el => el.dataset.id);
        filesArray = ids.map(id => filesArray.find(f => f.id === id));
    }

    function updateUI() {
        mergeBtn.disabled = filesArray.length === 0;
    }

    clearBtn.onclick = () => {
        filesArray = [];
        fileList.innerHTML = '';
        updateUI();
    };

    // 📸 CAMERA
    cameraBtn.onclick = async () => {
        cameraContainer.style.display = "block";

        try {
            stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment" }
            });
            video.srcObject = stream;
        } catch {
            alert("Camera not available.");
        }
    };

    captureBtn.onclick = () => {
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        canvas.getContext('2d').drawImage(video, 0, 0);

        canvas.toBlob(blob => {
            const file = new File([blob], `capture_${Date.now()}.jpg`, {
                type: "image/jpeg"
            });
            handleFiles([file]);
        });

        stopCamera();
        cameraContainer.style.display = "none";
    };

    function stopCamera() {
        if (stream) {
            stream.getTracks().forEach(t => t.stop());
            stream = null;
        }
    }

    // 📄 MERGE
    mergeBtn.onclick = async () => {
        mergeBtn.disabled = true;

        const { PDFDocument } = PDFLib;
        const mergedPdf = await PDFDocument.create();

        for (const file of filesArray) {
            const buffer = await file.arrayBuffer();

            if (file.type === "application/pdf") {
                const pdf = await PDFDocument.load(buffer);
                const pages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
                pages.forEach(p => mergedPdf.addPage(p));
            } else {
                const img = file.type === "image/png"
                    ? await mergedPdf.embedPng(buffer)
                    : await mergedPdf.embedJpg(buffer);

                const page = mergedPdf.addPage([img.width, img.height]);
                page.drawImage(img, { x: 0, y: 0, width: img.width, height: img.height });
            }
        }

        const pdfBytes = await mergedPdf.save();
        const blob = new Blob([pdfBytes], { type: "application/pdf" });

        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = "merged.pdf";
        link.click();

        mergeBtn.disabled = false;
    };
</script>
