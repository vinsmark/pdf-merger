<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro PDF Merger & Sorter</title>


<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f0f2f5;
        color: #333;
        margin: 0;
        padding: 40px;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    .container {
        background: white;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 600px;
        padding: 30px;
    }

    h2 {
        text-align: center;
        color: #1a73e8;
        margin-bottom: 20px;
    }

    #drop-zone {
        border: 2px dashed #1a73e8;
        border-radius: 10px;
        padding: 40px;
        text-align: center;
        cursor: pointer;
        background: #f8fbff;
        transition: 0.3s;
        color: #1a73e8;
        font-weight: 600;
    }

    #drop-zone:hover {
        background: #eef5ff;
    }

    #drop-zone i {
        font-size: 28px;
        margin-bottom: 10px;
        display: block;
    }

    #camera-btn {
        margin-top: 10px;
        width: 100%;
        background: #34a853;
        color: white;
    }

    #camera-container {
        display: none;
        margin-top: 15px;
        text-align: center;
    }

    video {
        width: 100%;
        border-radius: 8px;
    }

    #capture-btn {
        margin-top: 10px;
        background: #ea4335;
        color: white;
    }

    #file-list {
        margin: 20px 0;
    }

    .file-item {
        display: flex;
        align-items: center;
        background: #fff;
        border: 1px solid #ddd;
        margin-bottom: 8px;
        padding: 12px;
        border-radius: 8px;
        cursor: grab;
    }

    .file-number {
        background: #1a73e8;
        color: white;
        width: 24px;
        height: 24px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        margin-right: 15px;
    }

    .name {
        flex-grow: 1;
        font-size: 14px;
    }

    .remove-btn {
        color: #ff4d4d;
        cursor: pointer;
        font-size: 16px;
    }

    .actions {
        display: flex;
        gap: 10px;
        margin-top: 20px;
    }

    button {
        padding: 12px;
        border: none;
        border-radius: 6px;
        font-weight: 600;
        cursor: pointer;
        font-size: 14px;
    }

    #merge-btn {
        background: #1a73e8;
        color: white;
        flex: 1;
    }

    #clear-btn {
        background: #f1f3f4;
        flex: 1;
    }

    .hint {
        font-size: 12px;
        color: #666;
        text-align: center;
        margin-top: 10px;
    }
</style>


</head>

<body>


<div class="container">
    <h2><i class="fa-solid fa-file-pdf"></i> PDF Merger & Sorter</h2>

    <div id="drop-zone">
        <i class="fa-solid fa-cloud-arrow-up"></i>
        Click or Drag Files Here<br>
        <span style="font-size: 12px; color: #555;">PDF, PNG, JPG</span>
    </div>

    <button id="camera-btn"><i class="fa-solid fa-camera"></i> Use Camera</button>

    <div id="camera-container">
        <video id="camera" autoplay playsinline></video>
        <button id="capture-btn"><i class="fa-solid fa-circle-dot"></i> Capture</button>
    </div>

    <input type="file" id="file-input" multiple hidden accept=".pdf,image/*">

    <div id="file-list"></div>

    <div class="hint">↕️ Drag to reorder files</div>

    <div class="actions">
        <button id="clear-btn"><i class="fa-solid fa-trash"></i> Clear</button>
        <button id="merge-btn" disabled><i class="fa-solid fa-file-export"></i> Merge & Download</button>
    </div>
</div>

<script>
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const fileList = document.getElementById('file-list');
    const mergeBtn = document.getElementById('merge-btn');
    const clearBtn = document.getElementById('clear-btn');

    const cameraBtn = document.getElementById('camera-btn');
    const cameraContainer = document.getElementById('camera-container');
    const video = document.getElementById('camera');
    const captureBtn = document.getElementById('capture-btn');

    let filesArray = [];
    let stream = null;

    new Sortable(fileList, {
        animation: 150,
        onEnd: () => {
            reorderFiles();
            updateNumbers();
        }
    });

    dropZone.onclick = () => fileInput.click();
    fileInput.onchange = (e) => handleFiles(e.target.files);

    dropZone.ondragover = (e) => e.preventDefault();
    dropZone.ondrop = (e) => {
        e.preventDefault();
        handleFiles(e.dataTransfer.files);
    };

    function handleFiles(files) {
        for (let file of files) {
            file.id = Math.random().toString(36).substr(2, 9);
            filesArray.push(file);
            renderFileItem(file);
        }
        updateNumbers();
        updateUI();
    }

    function renderFileItem(file) {
        const div = document.createElement('div');
        div.className = 'file-item';
        div.dataset.id = file.id;
        div.innerHTML = `
            <div class="file-number">0</div>
            <span class="name">${file.name}</span>
            <i class="fa-solid fa-xmark remove-btn"></i>
        `;
        div.querySelector('.remove-btn').onclick = () => removeFile(file.id);
        fileList.appendChild(div);
    }

    function removeFile(id) {
        filesArray = filesArray.filter(f => f.id !== id);
        document.querySelector(`[data-id="${id}"]`).remove();
        updateNumbers();
        updateUI();
    }

    function updateNumbers() {
        document.querySelectorAll('.file-item').forEach((el, i) => {
            el.querySelector('.file-number').textContent = i + 1;
        });
    }

    function reorderFiles() {
        const ids = [...document.querySelectorAll('.file-item')].map(el => el.dataset.id);
        filesArray = ids.map(id => filesArray.find(f => f.id === id));
    }

    function updateUI() {
        mergeBtn.disabled = filesArray.length === 0;
    }

    clearBtn.onclick = () => {
        filesArray = [];
        fileList.innerHTML = '';
        updateUI();
    };

    cameraBtn.onclick = async () => {
        cameraContainer.style.display = "block";
        try {
            stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment" }
            });
            video.srcObject = stream;
        } catch {
            alert("Camera not available.");
        }
    };

    function stopCamera() {
        if (stream) {
            stream.getTracks().forEach(t => t.stop());
            stream = null;
        }
    }

    captureBtn.onclick = () => {
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0);

        const dataUrl = canvas.toDataURL("image/png");

        fetch(dataUrl)
            .then(res => res.arrayBuffer())
            .then(buffer => {
                const file = new File([buffer], `capture_${Date.now()}.png`, { type: "image/png" });
                handleFiles([file]);
            });

        stopCamera();
        cameraContainer.style.display = "none";
    };

    async function fileToPngBuffer(file) {
        const img = new Image();
        const url = URL.createObjectURL(file);

        return new Promise((resolve) => {
            img.onload = () => {
                const canvas = document.createElement('canvas');
                canvas.width = img.width;
                canvas.height = img.height;
                canvas.getContext('2d').drawImage(img, 0, 0);

                canvas.toBlob(async (blob) => {
                    const buffer = await blob.arrayBuffer();
                    resolve(buffer);
                }, "image/png");
            };
            img.src = url;
        });
    }

    mergeBtn.onclick = async () => {
        mergeBtn.disabled = true;

        const { PDFDocument } = PDFLib;
        const mergedPdf = await PDFDocument.create();

        for (const file of filesArray) {
            if (file.type === "application/pdf") {
                const buffer = await file.arrayBuffer();
                const pdf = await PDFDocument.load(buffer);
                const pages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
                pages.forEach(p => mergedPdf.addPage(p));
                continue;
            }

            const pngBuffer = await fileToPngBuffer(file);
            const img = await mergedPdf.embedPng(pngBuffer);

            const page = mergedPdf.addPage([img.width, img.height]);
            page.drawImage(img, { x: 0, y: 0, width: img.width, height: img.height });
        }

        const pdfBytes = await mergedPdf.save();
        const blob = new Blob([pdfBytes], { type: "application/pdf" });

        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = "merged.pdf";
        link.click();

        mergeBtn.disabled = false;
    };
</script>


</body>

</html>
